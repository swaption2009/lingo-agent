  <path d="M43 38v20c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c1.17 0 2.26.34 3.19.92V43l22-5v17c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c1.17 0 2.26.34 3.19.92V33L43 38z" 
