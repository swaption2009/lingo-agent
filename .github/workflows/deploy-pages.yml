name: Deploy Landing Page to GitHub Pages

# Publishes the static site in landing/ to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Source: "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Least-privilege permissions required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (and set the build source to GitHub Actions) via the
          # API if it isn't already enabled, so the first run doesn't 404.
          enablement: true

      - name: Upload landing/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
